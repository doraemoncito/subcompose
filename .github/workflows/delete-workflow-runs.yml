name: Delete workflow runs
on:
  workflow_dispatch: # This enables the "Run workflow" button in the UI

jobs:
  Delete-workflow-runs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      actions: write
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0          # Set to 0 to delete all eligible runs
          keep_minimum_runs: 0    # Set to 0 to leave nothing behind
